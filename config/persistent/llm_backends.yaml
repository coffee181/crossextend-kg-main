description: LLM backend registry for persistent runtime configs
default_backend: deepseek
backends:
  deepseek:
    base_url: https://api.deepseek.com
    api_key: ${DEEPSEEK_API_KEY}
    model: deepseek-chat
    timeout_sec: 600
    max_tokens: 4096
    temperature: 0.1
  deepseek_reasoner:
    base_url: https://api.deepseek.com
    api_key: ${DEEPSEEK_API_KEY}
    model: deepseek-reasoner
    timeout_sec: 1200
    max_tokens: 8192
    temperature: 0.0
  