project_name: CrossExtend-KG
benchmark_name: default_experiment

prompts:
  attachment_judge_template_path: ../prompts/attachment_judge.txt

backbone:
  seed_concepts:
    - Asset
    - Component
    - Signal
    - State
    - Fault
    - Seal
    - Connector
    - Sensor
    - Controller
    - Coolant
    - Actuator
    - Power
    - Housing
    - Fastener
    - Media
  seed_descriptions:
    Asset: industrial asset, machine, line, robot, battery pack, assembly, cabinet, robotic arm, control system, main equipment
    Component: part, module, bearing, reducer, lock, cooling module, hardware component, subassembly part, harness, sensor, motor, controller
    Signal: alarm, warning, telemetry, sensor reading, sensor signal, vibration signal, torque signal, temperature signal
    State: operating state, normal state, abnormal state, status condition, overload state, shortage status, shutdown state
    Fault: fault, failure, defect, damage, deviation, drift, anomaly root issue, isolation fault, temperature fault
    Seal: O-ring, gasket, membrane, diaphragm, seal land, lip seal, shaft seal, environmental seal, compression seal
    Connector: electrical connector, coupler, terminal block, header, splice pack, junction box, quick connector, interlock connector
    Sensor: temperature sensor, pressure sensor, position sensor, current sensor, voltage sensor, Hall sensor, NTC thermistor, resolver
    Controller: BMS main controller, motor controller, inverter, VFD, PLC, ECU, thermal management module, gateway module
    Coolant: coolant fluid, refrigerant, thermal loop, chiller branch, coolant hose, coolant pump, heat exchanger, bleed screw
    Actuator: contactor, relay, solenoid, valve, motor, pump, brake, servo drive, hydraulic cylinder
    Power: high-voltage bus, DC-DC converter, fuse, MSD, precharge circuit, OBC, charging inlet, power cable
    Housing: enclosure, case, cover, tray, shield, bracket, mount, bushing, manifold, carrier
    Fastener: bolt, nut, washer, stud, clip, retainer, screw, rivet, torque specification, thread
    Media: refrigerant gas, oil, grease, lubricant, dielectric fluid, air, nitrogen, desiccant

relations:
  relation_families:
    - task_dependency
    - communication
    - propagation
    - lifecycle
    - structural
  family_descriptions:
    task_dependency: dependency edges between assets, tasks, and actions
    communication: signal and reporting links
    propagation: fault propagation links
    lifecycle: event-state-action transitions
    structural: asset-component structural edges
  allowed_routes:
    - reuse_backbone
    - vertical_specialize
    - reject

data:
  normalize_whitespace: true

runtime:
  artifact_root: ../../artifacts
  retrieval_top_k: 3
  min_relation_support_count: 1
  llm_attachment_batch_size: 8
  save_latest_summary: true
  write_detailed_working_artifacts: false
  write_jsonl_artifacts: false
  write_graphml: true
  write_graph_db_csv: false
  write_property_graph_jsonl: false
  enable_embedding_cache: true
  embedding_cache_dir: ../../data/faiss-data
  run_prefix: run
  relation_constraints_path: ./relation_constraints.json
  enable_relation_validation: true

variants:
  - variant_id: full_llm
    description: Main pipeline with LLM attachment, embedding routing, and rule filtering
    attachment_strategy: llm
    use_embedding_routing: true
    use_rule_filter: true
    allow_free_form_growth: false
    enable_snapshots: true
    export_artifacts: true

domains:
  - domain_id: battery
    domain_name: Battery System
    role: target
    data_path: ../../data/evidence_records/battery_evidence_records_llm.json
    ontology_seed_path: null
    source_types:
      - om_manual
    domain_keywords:
      - battery
      - pack
      - cell
      - bms
      - cooling
      - capacity
      - degradation
  - domain_id: cnc
    domain_name: CNC Machine
    role: target
    data_path: ../../data/evidence_records/cnc_evidence_records_llm.json
    ontology_seed_path: null
    source_types:
      - om_manual
    domain_keywords:
      - cnc
      - spindle
      - servo
      - axis
      - coolant
      - vibration
      - bearing
  - domain_id: nev
    domain_name: New Energy Vehicle
    role: target
    data_path: ../../data/evidence_records/nev_evidence_records_llm.json
    ontology_seed_path: null
    source_types:
      - om_manual
    domain_keywords:
      - nev
      - vehicle
      - battery
      - module
      - drive
      - range
      - charging
