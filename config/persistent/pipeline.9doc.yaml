extends: ./pipeline.base.yaml

benchmark_name: full_9doc_experiment
llm_backend_id: deepseek_chat
embedding_backend_id: local_ollama_bge_m3

runtime:
  run_prefix: full_9doc

domains:
  - domain_id: battery
    domain_name: Battery System
    role: target
    data_path: ../../data/evidence_records/full_human_gold_9doc/battery_evidence_records_llm.json
    ontology_seed_path: null
    source_types:
      - om_manual
    domain_keywords:
      - battery
      - pack
      - cell
      - bms
      - cooling
      - capacity
      - degradation
  - domain_id: cnc
    domain_name: CNC Machine
    role: target
    data_path: ../../data/evidence_records/full_human_gold_9doc/cnc_evidence_records_llm.json
    ontology_seed_path: null
    source_types:
      - om_manual
    domain_keywords:
      - cnc
      - spindle
      - servo
      - axis
      - coolant
      - vibration
      - bearing
  - domain_id: nev
    domain_name: New Energy Vehicle
    role: target
    data_path: ../../data/evidence_records/full_human_gold_9doc/nev_evidence_records_llm.json
    ontology_seed_path: null
    source_types:
      - om_manual
    domain_keywords:
      - nev
      - vehicle
      - battery
      - module
      - drive
      - range
      - charging

variants:
  - variant_id: full_llm
    description: Main pipeline with LLM attachment, embedding routing, and rule filtering
    attachment_strategy: llm
    use_embedding_routing: true
    use_rule_filter: true
    allow_free_form_growth: false
    enable_snapshots: false
    export_artifacts: true